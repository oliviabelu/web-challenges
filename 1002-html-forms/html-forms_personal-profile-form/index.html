<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Personal Profile Form</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <h1 id="title">Create your Personal Profile</h1>
    <form aria-labelledby="title" aria-describedby="description">
      <p id="description">
        We want to get to know you! Please enter your personal information.
      </p>
      <fieldset aria-describedby="description">
        <legend>Personal Information</legend>
        <label for="firstName">First Name:</label>
        <input type="text" name="" id="firstName" />
        <label for="lastName">Last Name:</label>
        <input type="text" name="" id="lastName" />
        <label for="birthday">Your Birthday:</label>
        <input type="date" id="birthday" />
      </fieldset>
      <p id="furtherInfo">
        Can you tell us a little bit more? We want to annoy you with unwanted
        ads.
      </p>
      <fieldset aria-describedby="furtherInfo">
        <legend>Further Information</legend>
        <label for="favouriteColor">Favourite Color:</label>
        <input type="color" id="favouriteColor" value="#E5430F" />
        <label for="favouritePet">What's your favourite pet?</label>
        <select id="favouritePet">
          <option value="">--Please choose an option--</option>
          <option value="cat">Cat</option>
          <option value="dog">Dog</option>
          <option value="tarantula">Tarantula</option>
        </select>
      </fieldset>
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
